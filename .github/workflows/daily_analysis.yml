name: Daily Stock Analysis

on:
  schedule:
    # 北京时间工作日 18:30 自动运行（UTC时间10:30）
    - cron: '30 10 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily stock analysis
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_NAME: ${{ secrets.LLM_MODEL_NAME }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python main.py

      # 新增：邮件推送步骤（QQ邮箱为例）
      - name: Send analysis report via email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "📈 每日股票分析报告 - ${{ github.sha }}"
          body: |
            你好！
            
            今日股票分析报告已生成，请查收附件。
            报告自动生成时间：${{ github.event.head_commit.timestamp }}
          to: ${{ secrets.EMAIL_TO }}
          from: "每日股票分析机器人 <${{ secrets.EMAIL_FROM }}>"
          attachments: ./reports/*.md
