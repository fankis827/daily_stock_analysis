name: Daily Stock Analysis

on:
  schedule:
    - cron: '30 10 * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-docx  # 安装生成docx依赖

      - name: Run Analysis
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_NAME: ${{ secrets.LLM_MODEL_NAME }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python main.py

      - name: Convert MD to DOCX
        run: |
          for f in reports/*.md; do
            python -c "
import docx
import os
name = os.path.basename('$f').replace('.md', '')
doc = docx.Document()
with open('$f', 'r', encoding='utf-8') as f:
    doc.add_paragraph(f.read())
doc.save(f'reports/{name}.docx')
"
          done

      - name: Send Email with DOCX
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.163.com
          server_port: 465
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 📈 每日股票分析报告(DOCX版)
          body: 今日股票分析报告已生成，附件为DOCX格式
          to: ${{ secrets.EMAIL_TO }}
          from: 股票分析机器人 <${{ secrets.EMAIL_FROM }}>
          attachments: reports/*.docx
